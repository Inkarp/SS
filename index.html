<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharath ❤️ Srivani</title>
<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

.container{
    text-align:center;
    color:white;
    z-index:2;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
}

h2{
    font-weight:300;
}

.date{
    margin-top:20px;
    font-size:1.8rem;
    font-weight:bold;
}

.heart{
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    transform:rotate(45deg);
    animation:float 8s linear infinite;
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    border-radius:50%;
}

.heart::before{
    top:-10px;
    left:0;
}

.heart::after{
    left:-10px;
    top:0;
}

@keyframes float{
    0%{
        transform:translateY(100vh) rotate(45deg);
        opacity:0;
    }
    10%{opacity:1}
    100%{
        transform:translateY(-10vh) rotate(45deg);
        opacity:0;
    }
}

.button{
    margin-top:30px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d6d;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.button:hover{
    transform:scale(1.05);
}

.message{
    margin-top:25px;
    font-size:1.4rem;
    display:none;
}

</style>
</head>
<body>

<div class="container">

<h1>Hi Srivani ❤️</h1>
<h2>This is Sharath</h2>

<div class="date">Our Forever Begins On April 30 💍</div>

<button class="button" onclick="showMessage()">Click for a Surprise</button>

<div class="message" id="msg">
I can't wait to start our beautiful journey together. ❤️<br>
See you at the wedding! 💕
</div>

</div>

<script>

function createHeart(){

const heart=document.createElement("div");
heart.classList.add("heart");

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+5)+"s";
heart.style.opacity=Math.random();

 document.body.appendChild(heart);

 setTimeout(()=>{
 heart.remove();
 },8000);

}

setInterval(createHeart,300);

function showMessage(){

 document.getElementById("msg").style.display="block";

}

</script>

</body>
</html>
